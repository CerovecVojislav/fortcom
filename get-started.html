<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Started - Fortkom</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Urbanist:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-dark: #1e3a4f;
            --primary-medium: #2C4A5C;
            --accent-teal: #4a9d9c;
            --accent-light: #6bb8b7;
            --bg-light: #f8f9fa;
            --text-dark: #1a1a1a;
            --text-light: #ffffff;
            --text-muted: #6c757d;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            color: var(--text-dark);
            line-height: 1.6;
            background: var(--bg-light);
        }

        /* Header */
        header {
            background: var(--primary-medium);
            padding: 2rem;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .logo {
            text-align: center;
        }

        .logo img {
            max-width: 300px;
            width: 100%;
            height: auto;
        }

        .back-link {
            display: inline-block;
            margin-top: 1rem;
            color: var(--text-light);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: var(--accent-light);
        }

        /* Main Container */
        .container {
            max-width: 800px;
            margin: 3rem auto;
            padding: 0 2rem;
        }

        .form-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .form-header h1 {
            font-family: 'Urbanist', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 1rem;
        }

        .form-header p {
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
        }

        /* Form Styling */
        .contact-form {
            background: white;
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
        }

        .form-group {
            margin-bottom: 2rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: var(--primary-dark);
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .form-group label.required::after {
            content: ' *';
            color: var(--accent-teal);
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: white;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent-teal);
            box-shadow: 0 0 0 3px rgba(74, 157, 156, 0.1);
        }

        .form-group textarea {
            min-height: 150px;
            resize: vertical;
        }

        /* Checkbox Group */
        .checkbox-group {
            margin-bottom: 2rem;
        }

        .checkbox-group label {
            display: block;
            font-weight: 600;
            color: var(--primary-dark);
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .checkbox-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-right: 0.75rem;
            cursor: pointer;
            accent-color: var(--accent-teal);
        }

        .checkbox-item label {
            margin-bottom: 0;
            font-weight: 400;
            cursor: pointer;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 1.2rem;
            background: var(--accent-teal);
            color: white;
            border: none;
            border-radius: 50px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(74, 157, 156, 0.3);
            letter-spacing: 0.5px;
        }

        .submit-btn:hover {
            background: var(--accent-light);
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(74, 157, 156, 0.4);
        }

        .submit-btn:active {
            transform: translateY(-1px);
        }

        /* Success Message */
        .success-message {
            display: none;
            background: linear-gradient(135deg, var(--accent-teal), var(--accent-light));
            color: white;
            padding: 2rem;
            border-radius: 12px;
            text-align: center;
            margin-top: 2rem;
        }

        .success-message.show {
            display: block;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success-message h3 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        /* Footer */
        footer {
            background: var(--primary-dark);
            color: rgba(255, 255, 255, 0.8);
            text-align: center;
            padding: 2rem;
            font-size: 0.95rem;
            margin-top: 4rem;
        }

        footer p {
            margin: 0;
            color: rgba(255, 255, 255, 0.8);
        }

        footer a {
            color: var(--accent-light);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        footer a:hover {
            color: white;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 0 1.5rem;
            }

            .contact-form {
                padding: 2rem 1.5rem;
            }

            .form-header h1 {
                font-size: 2rem;
            }

            .logo img {
                max-width: 220px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <img src="fortkom-logo.png" alt="Fortkom Logo">
        </div>
        <a href="index.html" class="back-link">← Back to Home</a>
    </header>

    <div class="container">
        <div class="form-header">
            <h1>Let's Get Started</h1>
            <p>Tell us about your business and how we can help protect your revenue and streamline your operations.</p>
        </div>

        <form class="contact-form" id="contactForm">
            <div class="form-group">
                <label for="name" class="required">Full Name</label>
                <input type="text" id="name" name="name" required placeholder="John Smith">
            </div>

            <div class="form-group">
                <label for="email" class="required">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="john@company.com">
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="+1 (555) 123-4567">
            </div>

            <div class="form-group">
                <label for="company" class="required">Company Name</label>
                <input type="text" id="company" name="company" required placeholder="Your Company">
            </div>

            <div class="form-group">
                <label for="website">Website</label>
                <input type="url" id="website" name="website" placeholder="https://yourcompany.com">
            </div>

            <div class="form-group">
                <label for="platform">Primary Selling Platform</label>
                <select id="platform" name="platform">
                    <option value="">Select a platform</option>
                    <option value="amazon">Amazon</option>
                    <option value="walmart">Walmart</option>
                    <option value="ebay">eBay</option>
                    <option value="shopify">Shopify</option>
                    <option value="multiple">Multiple Platforms</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="checkbox-group">
                <label>What services are you interested in? (Select all that apply)</label>
                <div class="checkbox-item">
                    <input type="checkbox" id="service1" name="services" value="customer-support">
                    <label for="service1">Customer Support</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="service2" name="services" value="channel-management">
                    <label for="service2">Selling Channel Management</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="service3" name="services" value="dispute-handling">
                    <label for="service3">Dispute & Chargeback Handling</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="service4" name="services" value="operations">
                    <label for="service4">eCommerce Operations</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="service5" name="services" value="logistics">
                    <label for="service5">Logistics Coordination</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="service6" name="services" value="sales-retention">
                    <label for="service6">Sales & Retention Strategy</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="service7" name="services" value="data-analysis">
                    <label for="service7">Data Analysis & Process Optimization</label>
                </div>
            </div>

            <div class="form-group">
                <label for="message" class="required">Tell us about your current challenges</label>
                <textarea id="message" name="message" required placeholder="What are your biggest operational pain points? What specific problems are you facing?"></textarea>
            </div>

            <button type="submit" class="submit-btn">Submit Request</button>
        </form>

        <div class="success-message" id="successMessage">
            <h3>✓ Thank You!</h3>
            <p>We've received your request and will get back to you within 24 hours.</p>
        </div>
    </div>

    <footer>
        <p>© 2026 Fortkom. All rights reserved. | Created by <a href="#">Vojislav Cerovec</a></p>
    </footer>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Get form data
            const formData = new FormData(this);
            
            // Collect selected services
            const services = [];
            document.querySelectorAll('input[name="services"]:checked').forEach(checkbox => {
                services.push(checkbox.value);
            });
            
            // Here you would normally send the data to a server
            // For now, we'll just show a success message
            console.log('Form Data:', {
                name: formData.get('name'),
                email: formData.get('email'),
                phone: formData.get('phone'),
                company: formData.get('company'),
                website: formData.get('website'),
                platform: formData.get('platform'),
                services: services,
                message: formData.get('message')
            });
            
            // Hide form and show success message
            this.style.display = 'none';
            document.getElementById('successMessage').classList.add('show');
            
            // Scroll to success message
            document.getElementById('successMessage').scrollIntoView({ 
                behavior: 'smooth',
                block: 'center'
            });
        });
    </script>
</body>
</html>
