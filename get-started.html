<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Started - Fortkom</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Urbanist:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="fortkom-logo.png" alt="Fortkom Logo">
        </div>
        <a href="index.html" class="back-link">← Back to Home</a>
    </header>

    <div class="container">
        <div class="form-header">
            <h1>Let's Get Started</h1>
            <p>Tell us about your business and how we can help protect your revenue and streamline your operations.</p>
        </div>

        <form class="contact-form" id="contactForm">
            <div class="form-group">
                <label for="name" class="required">Full Name</label>
                <input type="text" id="name" name="name" required placeholder="John Smith">
            </div>

            <div class="form-group">
                <label for="email" class="required">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="john@company.com">
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="+1 (555) 123-4567">
            </div>

            <div class="form-group">
                <label for="company" class="required">Company Name</label>
                <input type="text" id="company" name="company" required placeholder="Your Company">
            </div>

            <div class="form-group">
                <label for="website">Website</label>
                <input type="url" id="website" name="website" placeholder="https://yourcompany.com">
            </div>

            <div class="form-group">
                <label for="platform">Primary Selling Platform</label>
                <select id="platform" name="platform">
                    <option value="">Select a platform</option>
                    <option value="amazon">Amazon</option>
                    <option value="walmart">Walmart</option>
                    <option value="ebay">eBay</option>
                    <option value="shopify">Shopify</option>
                    <option value="multiple">Multiple Platforms</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="checkbox-group">
                <label>What services are you interested in? (Select all that apply)</label>
                <div class="checkbox-item">
                    <input type="checkbox" id="service1" name="services" value="customer-support">
                    <label for="service1">Customer Support</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="service2" name="services" value="channel-management">
                    <label for="service2">Selling Channel Management</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="service3" name="services" value="dispute-handling">
                    <label for="service3">Dispute & Chargeback Handling</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="service4" name="services" value="operations">
                    <label for="service4">eCommerce Operations</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="service5" name="services" value="logistics">
                    <label for="service5">Logistics Coordination</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="service6" name="services" value="sales-retention">
                    <label for="service6">Sales & Retention Strategy</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="service7" name="services" value="data-analysis">
                    <label for="service7">Data Analysis & Process Optimization</label>
                </div>
            </div>

            <div class="form-group">
                <label for="message" class="required">Tell us about your current challenges</label>
                <textarea id="message" name="message" required placeholder="What are your biggest operational pain points? What specific problems are you facing?"></textarea>
            </div>

            <button type="submit" class="submit-btn">Submit Request</button>
        </form>

        <div class="success-message" id="successMessage">
            <h3>✓ Thank You!</h3>
            <p>We've received your request and will get back to you within 24 hours.</p>
        </div>
    </div>

    <footer>
        <p>© 2026 Fortkom. All rights reserved. | Created by <a href="#">Vojislav Cerovec</a></p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
